name: Daily News Update

on:
  schedule:
    - cron: '0 23 * * *' # 7:00 AM Singapore Time
  workflow_dispatch:

jobs:
  run-ai-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests google-generativeai

      - name: Execute AI Agent
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ai_news_agent.py

      - name: Commit and Push
        run: |
          git config --global user.name "AI-Bot"
          git config --global user.email "bot@github.com"
          git add index.html
          git commit -m "Automated Daily Update" || exit 0
          git push
