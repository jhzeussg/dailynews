name: Daily News Update

on:
  schedule:
    - cron: '15 0 * * *' # 7:00 AM Singapore Time
  workflow_dispatch:

# NEW: This line gives the robot permission to save the index.html file
permissions:
  contents: write

jobs:
  run-ai-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Updated to v6

      - name: Setup Python
        uses: actions/setup-python@v6 # Updated to v6
        with:
          python-version: '3.12' # Use a modern Python version

      - name: Install dependencies
        run: pip install requests google-generativeai

      - name: Execute AI Agent
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ai_news_agent.py

      - name: Commit and Push
        run: |
          git config --local user.name "AI-Bot"
          git config --local user.email "bot@github.com"
          git add index.html
          git commit -m "Automated Daily Update" || exit 0
          git push
